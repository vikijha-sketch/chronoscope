<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c2431">
<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  :root{
    --ink:#1c2431;
    --ink-2:#141a24;
    --parchment:#efe6d2;
    --parchment-2:#e3d5b3;
    --line:#2b2320;
    --brass:#b8892c;
    --brass-light:#d9ae52;
    --stamp:#a63d40;
    --seal:#3f6c63;
    --shadow: rgba(0,0,0,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100dvh;
    background:
      radial-gradient(ellipse at 50% -10%, #2a3448 0%, var(--ink) 55%, var(--ink-2) 100%);
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    overflow-x:hidden;
  }
  .stage{ width:100%; max-width:480px; }
  h1,h2,h3{ font-family:'Fraunces',serif; margin:0; }
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--brass-light);
    opacity:.85;
  }
  /* ---------- masthead ---------- */
  .masthead{ text-align:center; margin-bottom:22px; }
  .masthead h1{
    font-size: clamp(30px, 8vw, 42px);
    font-weight:900;
    letter-spacing:.02em;
    color:var(--parchment);
    margin:6px 0;
    text-shadow: 0 2px 0 rgba(0,0,0,.3);
  }
  .rule{
    height:1px;
    background: linear-gradient(90deg, transparent, var(--brass) 20%, var(--brass) 80%, transparent);
    margin:10px auto;
    width:70%;
  }
  /* ---------- card ---------- */
  .card{
    background: var(--parchment);
    color: var(--line);
    border-radius:6px;
    padding:22px 20px 24px;
    box-shadow: 0 18px 40px var(--shadow), 0 2px 0 rgba(0,0,0,.15) inset;
    position:relative;
    border: 1px solid rgba(0,0,0,.15);
  }
  .card::before{
    content:"";
    position:absolute; inset:8px;
    border: 1px solid rgba(43,35,32,.25);
    border-radius:3px;
    pointer-events:none;
  }
  .card-inner{ position:relative; }

  /* ---------- start screen ---------- */
  .start-copy{ font-size:15px; line-height:1.55; color:#3a3129; margin: 10px 0 20px; }
  .start-copy b{ color:var(--line); }
  .stat-row{
    display:flex; gap:10px; margin-bottom:20px;
  }
  .stat-chip{
    flex:1; text-align:center; background:var(--parchment-2);
    border-radius:4px; padding:10px 6px; border:1px solid rgba(43,35,32,.15);
  }
  .stat-chip .n{ font-family:'Space Mono',monospace; font-weight:700; font-size:18px; color:var(--stamp); display:block;}
  .stat-chip .l{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:#5a4f42;}

  button{
    font-family:'Inter',sans-serif;
    font-weight:700;
    border:none;
    cursor:pointer;
    -webkit-appearance:none;
  }
  .btn-primary{
    width:100%;
    background: linear-gradient(180deg, var(--brass-light), var(--brass));
    color:#221704;
    padding:15px 18px;
    border-radius:5px;
    font-size:16px;
    letter-spacing:.02em;
    box-shadow: 0 4px 0 #7d5c1a, 0 8px 16px rgba(0,0,0,.35);
    transition: transform .08s ease;
  }
  .btn-primary:active{ transform: translateY(3px); box-shadow: 0 1px 0 #7d5c1a, 0 4px 8px rgba(0,0,0,.3); }
  .btn-primary:disabled{ opacity:.45; box-shadow:none; cursor:not-allowed; }
  .btn-ghost{
    width:100%; background:transparent; color:#5a4f42;
    padding:10px; font-size:13px; margin-top:10px; text-decoration:underline;
  }

  /* ---------- top bar during round ---------- */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; padding:0 2px;
  }
  .topbar .eyebrow{ color:var(--brass-light); }
  .score-badge{
    font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    color:var(--parchment); background:rgba(184,137,44,.18);
    border:1px solid var(--brass); padding:4px 9px; border-radius:20px;
  }

  /* ---------- illustration frame ---------- */
  .frame{
    background: var(--parchment);
    border-radius:4px;
    padding:10px;
    position:relative;
    border: 2px solid var(--line);
    box-shadow: inset 0 0 0 5px var(--parchment), inset 0 0 0 6px var(--line);
    aspect-ratio: 4 / 3;
    overflow:hidden;
  }
  .frame svg{ display:block; width:100%; height:100%; }
  .frame .real-photo{
    display:block; width:100%; height:100%; object-fit:cover;
    filter: sepia(.18) contrast(1.03);
  }
  .plate-caption{
    text-align:center; font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    color:#6b5f50; margin-top:8px;
  }

  .prompt{
    font-size: clamp(18px,5vw,21px);
    line-height:1.35;
    margin: 18px 0 6px;
    color: var(--line);
    font-weight:600;
  }

  /* ---------- slider ---------- */
  .year-readout{
    text-align:center; margin: 18px 0 6px;
  }
  .year-readout .num{
    font-family:'Space Mono',monospace;
    font-size: 44px; font-weight:700; color:var(--stamp);
    letter-spacing:.02em;
  }
  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    appearance:none;
    height:6px;
    border-radius:4px;
    background: linear-gradient(90deg, var(--brass) 0%, var(--brass) var(--fill,50%), #cfc2a4 var(--fill,50%), #cfc2a4 100%);
    margin: 14px 0 6px;
    touch-action: pan-y;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:28px; height:28px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fff2d6, var(--brass) 70%);
    border:2px solid var(--line);
    box-shadow:0 2px 6px rgba(0,0,0,.4);
    cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:26px; height:26px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fff2d6, var(--brass) 70%);
    border:2px solid var(--line);
    cursor:pointer;
  }
  .tick-row{
    display:flex; justify-content:space-between;
    font-family:'Space Mono',monospace; font-size:10px; color:#8a7c67;
    padding: 0 2px;
  }

  /* ---------- reveal ---------- */
  .stamp-wrap{ position:relative; }
  .stamp{
    position:absolute; top:10%; left:50%;
    transform: translate(-50%,-10%) rotate(-8deg) scale(0.4);
    opacity:0;
    border: 5px solid var(--stamp);
    color:var(--stamp);
    font-family:'Space Mono',monospace;
    font-weight:700;
    letter-spacing:.06em;
    padding:6px 14px;
    border-radius:6px;
    background: rgba(239,230,210,.85);
    animation: stampIn .35s cubic-bezier(.2,1.4,.4,1) forwards .1s;
    white-space:nowrap;
    font-size:15px;
    z-index:3;
    pointer-events:none;
  }
  .stamp.good{ border-color:var(--seal); color:var(--seal); }
  @keyframes stampIn{
    0%{ opacity:0; transform: translate(-50%,-10%) rotate(-8deg) scale(.4); }
    60%{ opacity:1; transform: translate(-50%,-10%) rotate(-8deg) scale(1.08); }
    100%{ opacity:1; transform: translate(-50%,-10%) rotate(-8deg) scale(1); }
  }
  .result-row{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top:16px; font-family:'Space Mono',monospace; font-size:13px;
    border-top:1px dashed #b9a985; padding-top:12px;
  }
  .result-row b{ font-size:20px; color:var(--line); }
  .blurb{ font-size:13.5px; line-height:1.5; color:#4a4033; margin-top:10px; }
  .timeline{
    position:relative; height:34px; margin-top:16px;
    background: linear-gradient(90deg, transparent, #d9cba6, transparent);
    border-radius:3px;
  }
  .timeline .mark{
    position:absolute; top:0; bottom:0; width:2px; background:var(--line);
  }
  .timeline .dot{
    position:absolute; top:50%; width:16px; height:16px; border-radius:50%;
    transform: translate(-50%,-50%);
    border:2px solid var(--line);
  }
  .timeline .dot.actual{ background:var(--seal); }
  .timeline .dot.guess{ background:var(--stamp); }

  /* ---------- results screen ---------- */
  .rank{
    text-align:center; margin: 4px 0 18px;
  }
  .rank .n{ font-size:38px; font-weight:900; color:var(--stamp); }
  .review-list{ max-height:260px; overflow-y:auto; margin: 12px 0 18px; -webkit-overflow-scrolling:touch;}
  .review-item{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12.5px; padding:8px 4px; border-bottom:1px solid rgba(43,35,32,.12);
  }
  .review-item .ry{ font-family:'Space Mono',monospace; color:#5a4f42; }
  .review-item .pts{ font-family:'Space Mono',monospace; font-weight:700; color:var(--seal); }

  .footnote{
    text-align:center; margin-top:16px; font-size:11px; color:#7d7365; line-height:1.5;
  }
</style>
</head>

const YEAR_MIN = 1400, YEAR_MAX = 2025;

/* ============ STATE ============ */
let order = [];
let idx = 0;
let totalScore = 0;
let results = [];
let currentGuess = Math.round((YEAR_MIN+YEAR_MAX)/2);
let locked = false;

const app = document.getElementById('app');

function shuffledOrder(){
  const arr = ROUNDS.map((_,i)=>i);
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function hatchDefs(){
  return `<defs>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--line)" stroke-width="1.4" opacity=".35"/>
    </pattern>
  </defs>`;
}

function scoreFor(distance){
  return Math.max(0, Math.round(1000 * Math.exp(-distance/16)));
}

function photoInfo(r){
  if(r.photo && r.photo.indexOf('commons:') === 0){
    const name = r.photo.slice('commons:'.length);
    return {
      src: 'https://commons.wikimedia.org/wiki/Special:FilePath/' + encodeURIComponent(name) + '?width=800',
      pageUrl: 'https://commons.wikimedia.org/wiki/File:' + encodeURIComponent(name),
      attribution: 'Photo via Wikimedia Commons'
    };
  }
  return {
    src: 'images/' + r.photo,
    pageUrl: null,
    attribution: null
  };
}

function verdictFor(distance){
  if(distance === 0) return {label:"BULLSEYE", good:true};
  if(distance <= 5) return {label:"DEAD ON", good:true};
  if(distance <= 15) return {label:"CLOSE CALL", good:true};
  if(distance <= 50) return {label:"SAME ERA", good:false};
  return {label:"FAR OFF", good:false};
}

function rankFor(total){
  const max = ROUNDS.length*1000;
  const pct = total/max;
  if(pct >= .85) return "Master Chronologist";
  if(pct >= .65) return "Seasoned Historian";
  if(pct >= .42) return "Apprentice Archivist";
  if(pct >= .2) return "Novice Timekeeper";
  return "Lost in Time";
}

/* ============ RENDER: START ============ */
function renderStart(){
  app.innerHTML = `
    <div class="masthead">
      <div class="eyebrow">EST. 1440 &mdash; 2007</div>
      <h1>THE CHRONOSCOPE</h1>
      <div class="eyebrow">A Field Guide to Guessing the Year</div>
    </div>
    <div class="rule"></div>
    <div class="card"><div class="card-inner">
      <h2 style="font-size:22px;">Fourteen Moments in Time</h2>
      <p class="start-copy">Study each engraving, then slide the dial to the year you believe it happened. The closer your guess, the more points you'll earn. <b>${ROUNDS.length} rounds</b> in all, spanning six centuries.</p>
      <div class="stat-row">
        <div class="stat-chip"><span class="n">${ROUNDS.length}</span><span class="l">Rounds</span></div>
        <div class="stat-chip"><span class="n">${YEAR_MIN}</span><span class="l">Earliest</span></div>
        <div class="stat-chip"><span class="n">${YEAR_MAX}</span><span class="l">Latest</span></div>
      </div>
      <button class="btn-primary" id="startBtn">Begin the Investigation</button>
    </div></div>
  `;
  document.getElementById('startBtn').addEventListener('click', ()=>{
    order = shuffledOrder();
    idx = 0; totalScore = 0; results = [];
    renderRound();
  });
}

/* ============ RENDER: ROUND ============ */
function renderRound(){
  locked = false;
  const r = ROUNDS[order[idx]];
  const pinfo = photoInfo(r);
  currentGuess = Math.round((YEAR_MIN+YEAR_MAX)/2);
  const fillPct = ((currentGuess-YEAR_MIN)/(YEAR_MAX-YEAR_MIN))*100;

  app.innerHTML = `
    <div class="topbar">
      <span class="eyebrow">CASE ${idx+1} / ${ROUNDS.length}</span>
      <span class="score-badge">${totalScore} PTS</span>
    </div>
    <div class="card"><div class="card-inner">
      <div class="frame">
        <img class="real-photo" src="${pinfo.src}" alt="${r.title}" loading="eager"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="display:none;">
          ${hatchDefs()}
          ${r.svg}
        </svg>
      </div>
      <div class="plate-caption">${pinfo.pageUrl ? `<a href="${pinfo.pageUrl}" target="_blank" rel="noopener" style="color:inherit;">${pinfo.attribution}</a>` : `Exhibit ${idx+1} &mdash; Untitled`}</div>

      <p class="prompt">${r.title}<br><span style="font-weight:400;font-size:14px;color:#6b5f50;">In what year did this take place?</span></p>

      <div class="year-readout"><span class="num" id="yearNum">${currentGuess}</span></div>
      <input type="range" id="yearSlider" min="${YEAR_MIN}" max="${YEAR_MAX}" step="1" value="${currentGuess}" style="--fill:${fillPct}%">
      <div class="tick-row"><span>${YEAR_MIN}</span><span>${Math.round((YEAR_MIN+YEAR_MAX)/2)}</span><span>${YEAR_MAX}</span></div>

      <button class="btn-primary" id="lockBtn" style="margin-top:20px;">Lock In Guess</button>
    </div></div>
  `;

  const slider = document.getElementById('yearSlider');
  const numEl = document.getElementById('yearNum');
  slider.addEventListener('input', (e)=>{
    currentGuess = parseInt(e.target.value,10);
    numEl.textContent = currentGuess;
    const pct = ((currentGuess-YEAR_MIN)/(YEAR_MAX-YEAR_MIN))*100;
    slider.style.setProperty('--fill', pct+'%');
  });
  document.getElementById('lockBtn').addEventListener('click', ()=>{
    if(locked) return;
    locked = true;
    renderReveal(r);
  });
}

/* ============ RENDER: REVEAL ============ */
function renderReveal(r){
  const pinfo = photoInfo(r);
  const distance = Math.abs(currentGuess - r.year);
  const pts = scoreFor(distance);
  const verdict = verdictFor(distance);
  totalScore += pts;
  results.push({title:r.title, year:r.year, guess:currentGuess, pts});

  const guessPct = ((currentGuess-YEAR_MIN)/(YEAR_MAX-YEAR_MIN))*100;
  const actualPct = ((r.year-YEAR_MIN)/(YEAR_MAX-YEAR_MIN))*100;
  const isLast = idx === ROUNDS.length-1;

  app.innerHTML = `
    <div class="topbar">
      <span class="eyebrow">CASE ${idx+1} / ${ROUNDS.length}</span>
      <span class="score-badge">${totalScore} PTS</span>
    </div>
    <div class="card"><div class="card-inner">
      <div class="stamp-wrap">
        <div class="frame">
          <img class="real-photo" src="${pinfo.src}" alt="${r.title}" loading="eager"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="display:none;">
            ${hatchDefs()}
            ${r.svg}
          </svg>
        </div>
        <div class="stamp ${verdict.good?'good':''}">${verdict.label}</div>
      </div>

      <div class="result-row">
        <span>YOUR GUESS<br><b>${currentGuess}</b></span>
        <span style="text-align:center;">OFF BY<br><b>${distance} yr${distance===1?'':'s'}</b></span>
        <span style="text-align:right;">ACTUAL<br><b>${r.year}</b></span>
      </div>

      <div class="timeline">
        <div class="dot guess" style="left:${guessPct}%;"></div>
        <div class="dot actual" style="left:${actualPct}%;"></div>
      </div>

      <p class="blurb">${r.blurb}</p>
      <p style="font-family:'Space Mono',monospace; font-size:13px; color:var(--seal); margin-top:12px;">+ ${pts} points</p>

      <button class="btn-primary" id="nextBtn" style="margin-top:8px;">${isLast? 'See Final Results' : 'Next Case'}</button>
    </div></div>
  `;

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(isLast){
      renderResults();
    } else {
      idx++;
      renderRound();
    }
  });
}

/* ============ RENDER: RESULTS ============ */
function renderResults(){
  const rank = rankFor(totalScore);
  const max = ROUNDS.length*1000;
  const avgErr = Math.round(results.reduce((s,r)=>s+Math.abs(r.guess-r.year),0)/results.length);

  app.innerHTML = `
    <div class="masthead">
      <div class="eyebrow">CASE FILE CLOSED</div>
      <h1 style="font-size:clamp(24px,7vw,32px);">FINAL REPORT</h1>
    </div>
    <div class="card"><div class="card-inner">
      <div class="rank">
        <div class="eyebrow">YOUR TITLE</div>
        <div class="n">${rank}</div>
      </div>
      <div class="stat-row">
        <div class="stat-chip"><span class="n">${totalScore}</span><span class="l">of ${max}</span></div>
        <div class="stat-chip"><span class="n">${avgErr}</span><span class="l">Avg. Yrs Off</span></div>
      </div>
      <div class="review-list">
        ${results.map(r=>`
          <div class="review-item">
            <span>${r.title}</span>
            <span class="ry">${r.guess} &rarr; ${r.year}</span>
            <span class="pts">+${r.pts}</span>
          </div>
        `).join('')}
      </div>
      <button class="btn-primary" id="againBtn">Investigate Again</button>
      <button class="btn-ghost" id="shareBtn">Copy Results</button>
    </div></div>
    <p class="footnote">Add this page to your Home Screen for a full-screen, app-like experience on iOS or Android.</p>
  `;

  document.getElementById('againBtn').addEventListener('click', renderStart);
  document.getElementById('shareBtn').addEventListener('click', ()=>{
    const text = `The Chronoscope — ${rank}\n${totalScore}/${max} pts, avg ${avgErr} yrs off\n` +
      results.map(r=>`${r.title}: guessed ${r.guess}, actual ${r.year} (+${r.pts})`).join('\n');
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>{
        const btn = document.getElementById('shareBtn');
        btn.textContent = 'Copied!';
        setTimeout(()=>btn.textContent='Copy Results', 1400);
      });
    }
  });
}

renderStart();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {
      // Fails silently if the file isn't hosted (e.g. opened straight from disk) —
      // the game still works fully without offline caching.
    });
  });
}
